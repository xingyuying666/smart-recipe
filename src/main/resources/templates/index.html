<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="zxx" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>AI Assistant</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/cropped-favicon-32x32.png"/>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css"/>

    <link href="assets/css/style.css" rel="stylesheet" type="text/css"/>

    <link href="assets/css/plugin.css" rel="stylesheet" type="text/css"/>

    <link href="assets/css/dashboard.css" rel="stylesheet" type="text/css"/>

    <link href="assets/fonts/flaticon.css" rel="stylesheet" type="text/css"/>

    <link href="assets/css/icons.css" rel="stylesheet" type="text/css"/>

    <link rel="stylesheet" href="assets/fonts/line-icons.css" type="text/css"/>
    <link rel="stylesheet" href="common/font-awesome/css/font-awesome.min.css">
</head>
<body class="home-3">

<div id="preloader">
    <div id="status"></div>
</div>

<div th:replace="common/common-bar::#header"></div>

<section class="banner">
    <div class="container">
        <div class="banner-content">
            <div class="row flex-row-reverse align-items-end">
                <div class="col-lg-6 col-md-12 col-sm-12 text-end">
                    <div class="banner-ct-wrap">
                        <div class="banner-head">
                            <h4 class="cl-green">AI Assistant</h4>
                            <h1>Let cooking be an expression of love</h1>
                        </div>

                        <a href="aboutUs" class="btn">More</a>
                    </div>
                </div>
                <div class="col-lg-6 col-md-12 col-sm-12">
                    <div class="banner-image-3">
                        <img src="assets/images/banner/NTH_M71_07_07-2048x1191.png" alt=""/>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="svg-image svg-img-rotate position-absolute start-0 bottom-0 w-100">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
            <path class="elementor-shape-fill" opacity="0.33"
                  d="M473,67.3c-203.9,88.3-263.1-34-320.3,0C66,119.1,0,59.7,0,59.7V0h1000v59.7 c0,0-62.1,26.1-94.9,29.3c-32.8,3.3-62.8-12.3-75.8-22.1C806,49.6,745.3,8.7,694.9,4.7S492.4,59,473,67.3z"></path>
            <path class="elementor-shape-fill" opacity="0.66"
                  d="M734,67.3c-45.5,0-77.2-23.2-129.1-39.1c-28.6-8.7-150.3-10.1-254,39.1 s-91.7-34.4-149.2,0C115.7,118.3,0,39.8,0,39.8V0h1000v36.5c0,0-28.2-18.5-92.1-18.5C810.2,18.1,775.7,67.3,734,67.3z"></path>
            <path class="elementor-shape-fill"
                  d="M766.1,28.9c-200-57.5-266,65.5-395.1,19.5C242,1.8,242,5.4,184.8,20.6C128,35.8,132.3,44.9,89.9,52.5C28.6,63.7,0,0,0,0 h1000c0,0-9.9,40.9-83.6,48.1S829.6,47,766.1,28.9z"></path>
        </svg>
    </div>
</section>

<section th:if="${session.loginUser == null}" class="appointment bg-sfgrey-3">
    <div class="container">
        <div class="row align-items-center flex-mxl-column-reverse">
            <div class="col-lg-6 col-md-12">
                <div class="appoint-form mb-xs-0">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input id="userAccount" type="text" class="form-control" placeholder="username"/>
                        </div>
                        <div class="col-md-6">
                            <input id="userName" type="text" class="form-control" placeholder="name"/>
                        </div>

                        <div class="col-6">
                            <input id="userPwd" type="password" class="form-control" placeholder="password"/>
                        </div>

                        <div class="col-md-6">
                            <input id="userTel" type="number" class="form-control" placeholder="mobile"/>
                        </div>


                        <div class="col-md-6">
                            <input id="userAge" type="number" class="form-control" placeholder="age"/>
                        </div>

                        <div class="col-md-6">
                            <select id="userSex" class="niceSelect">
                                <option selected value="男">male</option>
                                <option value="女">female</option>
                            </select>
                        </div>

                        <div class="col-6">
                            <input id="userEmail" type="text" class="form-control" placeholder="email"/>
                        </div>
                        <div class="col-4">
                            <input id="code" type="text" class="form-control" placeholder="code"/>
                        </div>
                        <div class="col-2">
                            <button id="email-code" class="btn btn-na" onclick="sendEmailCode()">Get</button>
                        </div>

                        <div class="col-12 text-center">
                            <button onclick="register()" class="btn btn-primary">Register now</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-12 ps-lg-5">
                <div class="sc-title-two sc-border-left sc-border-none appoint-info w-100 mb-xs-0">
                    <h2 class="mt-3 mb-3">After registering an account, you can enjoy more benefits</h2>
                    <h3 class="cl-lgreen mt-3 mb-3">CALL: 8888 6666</h3>
                </div>
            </div>
        </div>
    </div>
</section>


<div th:replace="common/common-bar::#back"></div>

<div th:replace="common/common-bar::#footer"></div>

<div th:replace="common/common-bar::#search"></div>

<div th:replace="common/common-bar::#back-to-top"></div>

<script src="assets/js/jquery-3.5.1.min.js"></script>
<script src="assets/js/bootstrap.min.js"></script>
<script src="assets/js/plugin.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/custom-swiper.js"></script>
<script src="assets/js/custom-nav.js"></script>
<script src="common/utils/reg.js"></script>
<script src="common/layer/layer.js"></script>
<script src="common/custom.js"></script>
</body>
</html>
